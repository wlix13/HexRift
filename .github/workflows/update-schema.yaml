name: 🔄 Update JSON schema

on:
  push:
    branches:
      - main
    paths:
      - "hexrift/components/schema/models/**"
      - "hexrift/constants.py"

permissions:
  contents: write

jobs:
  update-schema:
    name: 🏗️ Update schema.json
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - run: uv sync --group dev

      - name: Generate schema.json
        run: |
          uv run python -c "
          import json
          from hexrift.components.schema.models.root import ConglomerateConfig
          print(json.dumps(ConglomerateConfig.model_json_schema(), indent=2))
          " > hexrift/components/schema/schema.json

      - id: diff
        run: |
          git add hexrift/components/schema/schema.json
          git diff --cached --quiet hexrift/components/schema/schema.json || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add hexrift/components/schema/schema.json
          git commit -m "chore(schema): update schema.json [skip ci]"
          git pull --rebase origin main
          git push
